apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-for-harness-demo
  labels:
    app: app-for-harness-demo
spec:
  replicas: {{.Values.replicaCount}}
  selector:
    matchLabels:
      app: app-for-harness-demo
  template:
    metadata:
      labels:
        app: app-for-harness-demo
    spec:
      imagePullSecrets:
        - name: harness-registry-secret
      containers:
        - name: app-for-harness-demo
          image: {{.Values.image.repository}}:{{.Values.image.tag}}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
